<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weryfikacja zakończona - Górnik TBG</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 64px;
            color: #2ecc71;
            margin-bottom: 1rem;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            color: #1a1a1a;
        }
        p {
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }
        .close-hint {
            font-size: 14px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .brand {
            font-weight: bold;
            color: #1a1a1a;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Konto zweryfikowane!</h1>
        <p>Dziękujemy. Twoje konto w serwisie <span class="brand">GórnikOpen</span> jest już aktywne i gotowe do użycia.</p>
        <div class="close-hint">
            Możesz teraz bezpiecznie zamknąć to okno przeglądarki.
        </div>
    </div>
</body>
</html>
